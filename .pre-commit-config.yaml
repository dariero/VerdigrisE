minimum_pre_commit_version: "4.6.0"

repos:
  - repo: local
    hooks:
      - id: check-added-large-files
        name: check for added large files
        entry: uv run --no-sync check-added-large-files
        language: unsupported
        stages: [pre-commit, pre-push, manual]
      - id: check-case-conflict
        name: check for case conflicts
        entry: uv run --no-sync check-case-conflict
        language: unsupported
      - id: check-merge-conflict
        name: check for merge conflicts
        entry: uv run --no-sync check-merge-conflict
        language: unsupported
        types: [text]
      - id: check-toml
        name: check toml
        entry: uv run --no-sync check-toml
        language: unsupported
        types: [toml]
      - id: check-yaml
        name: check yaml
        entry: uv run --no-sync check-yaml
        language: unsupported
        types: [yaml]
      - id: detect-private-key
        name: detect private key
        entry: uv run --no-sync detect-private-key
        language: unsupported
        types: [text]
      - id: end-of-file-fixer
        name: fix end of files
        entry: uv run --no-sync end-of-file-fixer
        language: unsupported
        types: [text]
        stages: [pre-commit, pre-push, manual]
      - id: trailing-whitespace
        name: trim trailing whitespace
        entry: uv run --no-sync trailing-whitespace-fixer
        language: unsupported
        types: [text]
        stages: [pre-commit, pre-push, manual]
      - id: ruff-check
        name: ruff check
        entry: uv run --no-sync ruff check --force-exclude
        language: unsupported
        types_or: [python, pyi, jupyter]
        args: [--fix]
        require_serial: true
      - id: ruff-format
        name: ruff format
        entry: uv run --no-sync ruff format --force-exclude
        language: unsupported
        types_or: [python, pyi, jupyter]
        require_serial: true
