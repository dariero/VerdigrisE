name: Dependency submission

on:
  push:
    branches: [main]
    paths:
      - pyproject.toml
      - pylock.toml
      - .github/scripts/build_dependency_snapshot.py
      - .github/workflows/dependency-submission.yml
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: dependency-submission-${{ github.ref }}
  cancel-in-progress: true

jobs:
  submit-pylock:
    name: Submit exact Python lock inventory
    if: ${{ github.ref == 'refs/heads/main' }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write
    env:
      OPENAI_API_KEY: ""
      ANTHROPIC_API_KEY: ""

    steps:
      - name: Check out the submitted revision
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Install Python through pinned uv
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          version: "0.11.28"
          python-version: "3.14"
          enable-cache: false

      - name: Build the exact dependency snapshot
        run: |
          uv venv --python 3.14
          .venv/bin/python .github/scripts/build_dependency_snapshot.py \
            --sha "$GITHUB_SHA" \
            --ref "$GITHUB_REF" \
            --job-id "${GITHUB_RUN_ID}.${GITHUB_RUN_ATTEMPT}" \
            --job-url "${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}" \
            --output dependency-snapshot.json

      - name: Submit the snapshot to GitHub
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh api \
            --method POST \
            --header "X-GitHub-Api-Version: 2026-03-10" \
            "repos/${GITHUB_REPOSITORY}/dependency-graph/snapshots" \
            --input dependency-snapshot.json \
            > dependency-submission-response.json
          .venv/bin/python - <<'PY'
          import json
          from pathlib import Path

          response = json.loads(Path("dependency-submission-response.json").read_text())
          if response.get("result") != "SUCCESS":
              raise SystemExit(f"dependency submission failed: {response}")
          PY
