name: CI

on:
  push:
    branches: [main]
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  free-validation:
    name: Free deterministic validation
    if: ${{ github.event_name != 'pull_request' || !github.event.pull_request.draft }}
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      OPENAI_API_KEY: ""
      ANTHROPIC_API_KEY: ""

    steps:
      - name: Check out the tested revision
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false

      - name: Install uv
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          version: "0.11.30"
          python-version: "3.14"
          enable-cache: false

      - name: Verify dependency lock consistency
        run: |
          uv lock --check --python 3.14 --prerelease disallow
          uv export \
            --frozen \
            --format pylock.toml \
            --all-groups \
            --no-emit-project \
            --python 3.14 \
            --prerelease disallow \
            --no-header \
            --quiet \
            --output-file "$RUNNER_TEMP/pylock.generated.toml"
          cmp pylock.toml "$RUNNER_TEMP/pylock.generated.toml"

      - name: Install the locked environment
        run: |
          uv venv --python 3.14
          uv pip sync --preview-features pylock --require-hashes pylock.toml
          uv pip check

      - name: Validate the pre-commit configuration
        run: .venv/bin/pre-commit validate-config

      - name: Run all repository hooks
        run: .venv/bin/pre-commit run --all-files --show-diff-on-failure

      - name: Run the free deterministic coverage gate
        run: >-
          .venv/bin/python -m pytest
          -m "not openai and not rag_test"
          --cov
          --cov-report=term-missing
          eval/
          -q
